deny:
  # Local DBC drop-in contains many raw/crawl corpora. Include only the
  # instruction-like allow_overrides above for now.
  - "dbc/**"

  # ReClor: upstream terms are non-commercial research only and passages come
  # from websites/books not owned by the dataset authors.
  - "sapient_cleaned/data/Platypus/reclor.jsonl"

  # SciBench: textbook-derived provenance; keep out unless rights are reviewed.
  - "sapient_cleaned/data/Platypus/scibench.jsonl"

  # ReClor stays eval-only by project decision, including recast copies.
  - "sapient_cleaned/data_clustered/tasksource/reclor.parquet"

  # Harsh robots.txt cases, excluded by project decision on 2026-06-01:
  # - Google and Bing disallow search endpoints, so do not include
  #   search-derived Natural Questions Open or MS MARCO FLAN transforms.
  # - data.statmt.org disallows User-agent: * at /, so do not include WMT or
  #   News Commentary FLAN transforms that depend on that source route.
  - "sapient_cleaned/data_clustered/flan/*natural_questions_open*.parquet"
  - "sapient_cleaned/data_clustered/flan/*naturalquestion*.parquet"
  - "sapient_cleaned/data_clustered/flan/*msmarco*.parquet"
  - "sapient_cleaned/data_clustered/flan/*wmt*.parquet"
  - "sapient_cleaned/data_clustered/flan/*newscomm*.parquet"

  # High-GDPR/PII-risk FLAN residuals. Copyright/licence uncertainty alone is
  # no longer a blocker for this academic research run when access is lawful
  # under the EU DSM Article 3 TDM exception. Real user/chat/social text stays
  # excluded.
  - "sapient_cleaned/data_clustered/flan/*tweet*.parquet"
  - "sapient_cleaned/data_clustered/flan/*twitter*.parquet"
  - "sapient_cleaned/data_clustered/flan/*dialog*.parquet"
