  - "sapient_cleaned/data_clustered/flan/*detox*.parquet"
  - "sapient_cleaned/data_clustered/flan/*offensive*.parquet"
  - "sapient_cleaned/data_clustered/flan/*goemotions*.parquet"
  - "sapient_cleaned/data_clustered/flan/*sms*.parquet"
  - "sapient_cleaned/data_clustered/flan/*spam*.parquet"
  - "sapient_cleaned/data_clustered/flan/*review*.parquet"
