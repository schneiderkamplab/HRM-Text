name: baselines.hrm_nocarry_bp_warmup@HierarchicalReasoningModel
head: lm_head@LMHead

half_layers: True  # Divide layers by 2, split layers evenly to H and L.

# HRM config
H_cycles: 2
L_cycles: 3
H_override: {}

bp_warmup_ratio: 0.2
bp_max_steps: 5

# Goldfish loss is disabled by default. Set goldfish_strategy=hash to drop a
# deterministic content-dependent subset of supervised labels.
goldfish_strategy: null
goldfish_k: 50
goldfish_context_width: 50
goldfish_seed: 0
